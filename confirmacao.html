<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pedido Confirmado | House Laser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="container">
    <h2 class="logo">House Laser</h2>
  </div>
</header>

<section class="confirmacao">
  <div class="confirmacao-container reveal">

    <div class="icone-sucesso">✔</div>

    <h1>Pedido recebido!</h1>

    <p>
      Seu pedido foi registrado com sucesso.  
      Em breve entraremos em contato para confirmar os detalhes da personalização.
    </p>

    <div class="resumo-pedido">
      <h3>Resumo do pedido</h3>

      <p><strong>Produto:</strong> <span id="conf-produto"></span></p>
      <p><strong>Total:</strong> <span id="conf-total"></span></p>
    </div>

    <div class="acoes">
      <a href="index.html" class="btn">Voltar para o site</a>
      <a href="produtos.html" class="btn btn-secundario">Ver mais produtos</a>
    </div>

  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">
    © 2026 House Laser Personalizados
  </div>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const produto = params.get("produto");
  const total = params.get("total");

  if (produto && total) {
    document.getElementById("conf-produto").textContent = produto;
    document.getElementById("conf-total").textContent = total;
  }
</script>

</body>
</html>
