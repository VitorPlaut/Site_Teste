<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Checkout | House Laser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="container">
    <h2 class="logo">House Laser</h2>
  </div>
</header>

<section class="checkout">
  <div class="checkout-container">

    <h1>Finalizar Pedido</h1>

    <div class="checkout-box">

      <!-- RESUMO -->
      <div class="checkout-resumo">
  <div class="checkout-resumo">
  <h3>Resumo do pedido</h3>

  <div class="item">
    <span id="produto-nome">Produto</span>
  </div>

  <div class="total">
    <span>Total</span>
    <strong id="produto-total">R$ 0,00</strong>
  </div>
</div>

      <!-- PAGAMENTO -->
      <div class="checkout-pagamento">
      <h3 class="checkout-title">Forma de pagamento</h3>
    <p class="checkout-subtitle">
     Escolha como prefere finalizar seu pedido
    </p>

        <label class="opcao">
          <input type="radio" name="pagamento" checked>
          <span>Pix</span>
        </label>

        <label class="opcao">
          <input type="radio" name="pagamento">
          <span>Cartão de crédito</span>
        </label>

        <a 
        href="https://wa.me/5549988721313?text=Olá!%20Gostaria%20de%20finalizar%20meu%20pedido%20personalizado."
        class="btn btn-checkout"
         target="_blank"
>
       CONCLUIR PEDIDO VIA WHATSAPP
        </a>

        <p class="aviso">
          * Ambiente de teste. Nenhum pagamento real será processado.
        </p>
      </div>

    </div>

  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">
    © 2026 House Laser Personalizados
  </div>
</footer>

</body>
</html>
